    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        .alert-content { flex: 1; } .alert-title { font-size: 13px; font-weight: 500; color: #fca5a5; } .alert-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .ai-text { font-size: 14px; color: #cbd5e1; line-height: 1.7; }

        .chart-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .chart-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
        .gauge-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; } .gauge-value { font-size: 42px; font-weight: 700; } .gauge-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; } .gauge-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; margin-top: 16px; overflow: hidden; } .gauge-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

            70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }

<body>
    <div class="header">
        <div class="header-left"><div class="logo">🏥</div><div><h1>MediWatch AI</h1><div class="header-subtitle" data-i18n="subtitle">Clinical Support Dashboard</div></div></div>
        <div class="header-right">
            <select id="lang-select" class="lang-dropdown" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="hi">हिंदी (Hindi)</option>
                <option value="kn">ಕನ್ನಡ (Kannada)</option>
            </select>
            
            <button class="btn-secondary" onclick="window.open('/api/export', '_blank')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 
                <span data-i18n="export">Export CSV</span>
            </button>
            <button class="btn-primary" onclick="openModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> 
                <span data-i18n="addPatient">Add Patient</span>
            </button>
            <div class="sync-badge" id="syncIndicator">↻ Auto-Sync: 20s</div>
            <div class="time" id="clock"></div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><div class="stat-label" data-i18n="total">Total Patients</div><div class="stat-value blue" id="stat-total">-</div></div>
        <div class="stat-item"><div class="stat-label" data-i18n="normal">Normal</div><div class="stat-value green" id="stat-normal">-</div></div>
        <div class="stat-item"><div class="stat-label" data-i18n="warning">Warning</div><div class="stat-value yellow" id="stat-warning">-</div></div>
        <div class="stat-item"><div class="stat-label" data-i18n="critical">Critical</div><div class="stat-value red" id="stat-critical">-</div></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title"><span data-i18n="patientList">Patient List</span></div>
            <div id="patient-list"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <div class="main" id="main-panel">
            <div class="loading"><div class="spinner"></div><div style="color:#475569;font-size:13px">Fetching Patient Data...</div></div>
        </div>
    </div>

    <div class="modal-overlay" id="addPatientModal">
        <div class="modal-content">
            <div class="modal-header"><h2 data-i18n="addModalTitle">Add New Patient</h2><button class="close-btn" onclick="closeModal()">&times;</button></div>
            <form id="addPatientForm" onsubmit="submitPatient(event)">
                <div class="form-group"><label>Patient Name</label><input type="text" id="p_name" required></div>
                <div class="form-row">
                    <div class="form-group"><label>Age</label><input type="number" id="p_age" required></div>
                    <div class="form-group"><label>Heart Rate (bpm)</label><input type="number" id="p_hr" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>BP Systolic</label><input type="number" id="p_sys" required></div>
                    <div class="form-group"><label>BP Diastolic</label><input type="number" id="p_dia" required></div>
                </div>
                <div class="form-group"><label>Oxygen Saturation (%)</label><input type="number" id="p_ox" required></div>
                <button type="submit" class="btn-submit" data-i18n="regBtn">Register Patient</button>
            </form>
        </div>
    </div>
    <div id="toast-container"></div>
    
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const i18n = {
            en: { subtitle: "Clinical Support Dashboard", export: "Export CSV", addPatient: "Add Patient", total: "Total Patients", normal: "Normal", warning: "Warning", critical: "Critical", patientList: "Patient List", addModalTitle: "Add New Patient", regBtn: "Register Patient", alertsTitle: "⚠ Anomaly Alerts", noAlerts: "✓ All vitals within normal range", predictiveAI: "Predictive Clinical AI", speakBtn: "Speak", hrTrend: "❤️ Heart Rate Trend", bpTrend: "🩺 Blood Pressure Trend", o2Sat: "💨 Oxygen Saturation", radar: "📊 Vitals Radar", alertUrgent: "🚨 URGENT: Patient entered CRITICAL condition!", measured: "Measured", normalRange: "Normal range", abnormal: "ABNORMAL", heart_rate: "Heart Rate", blood_pressure_sys: "BP Systolic", blood_pressure_dia: "BP Diastolic", oxygen: "Oxygen", liveSensor: "🔌 LIVE SENSOR" },
            hi: { subtitle: "क्लिनिकल सपोर्ट डैशबोर्ड", export: "CSV निर्यात करें", addPatient: "रोगी जोड़ें", total: "कुल रोगी", normal: "सामान्य", warning: "चेतावनी", critical: "गंभीर", patientList: "रोगी सूची", addModalTitle: "नया रोगी जोड़ें", regBtn: "रोगी पंजीकृत करें", alertsTitle: "⚠ विसंगति अलर्ट", noAlerts: "✓ सभी विटल्स सामान्य सीमा में", predictiveAI: "प्रेडिक्टिव क्लिनिकल AI", speakBtn: "बोलें", hrTrend: "❤️ हार्ट रेट ट्रेंड", bpTrend: "🩺 ब्लड प्रेशर ट्रेंड", o2Sat: "💨 ऑक्सीजन संतृप्ति", radar: "📊 विटल्स रडार", alertUrgent: "🚨 तत्काल: रोगी गंभीर स्थिति में है!", measured: "मापा गया", normalRange: "सामान्य सीमा", abnormal: "असामान्य", heart_rate: "हार्ट रेट", blood_pressure_sys: "बीपी सिस्टोलिक", blood_pressure_dia: "बीपी डायस्टोलिक", oxygen: "ऑक्सीजन", liveSensor: "🔌 लाइव सेंसर" },
            kn: { subtitle: "ಕ್ಲಿನಿಕಲ್ ಬೆಂಬಲ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್", export: "CSV ರಫ್ತು", addPatient: "ರೋಗಿಯನ್ನು ಸೇರಿಸಿ", total: "ಒಟ್ಟು ರೋಗಿಗಳು", normal: "ಸಾಮಾನ್ಯ", warning: "ಎಚ್ಚರಿಕೆ", critical: "ಗಂಭೀರ", patientList: "ರೋಗಿಗಳ ಪಟ್ಟಿ", addModalTitle: "ಹೊಸ ರೋಗಿಯನ್ನು ಸೇರಿಸಿ", regBtn: "ರೋಗಿಯನ್ನು ನೋಂದಾಯಿಸಿ", alertsTitle: "⚠ ಅಸಂಗತತೆ ಎಚ್ಚರಿಕೆಗಳು", noAlerts: "✓ ಎಲ್ಲಾ ಪ್ರಮುಖ ಅಂಶಗಳು ಸಾಮಾನ್ಯ", predictiveAI: "ಮುನ್ಸೂಚಕ ಕ್ಲಿನಿಕಲ್ AI", speakBtn: "ಮಾತನಾಡು", hrTrend: "❤️ ಹೃದಯ ಬಡಿತದ ಪ್ರವೃತ್ತಿ", bpTrend: "🩺 ರಕ್ತದೊತ್ತಡದ ಪ್ರವೃತ್ತಿ", o2Sat: "💨 ಆಮ್ಲಜನಕದ ಶುದ್ಧತ್ವ", radar: "📊 ವಿಟಲ್ಸ್ ರೇಡಾರ್", alertUrgent: "🚨 ತುರ್ತು: ರೋಗಿಯು ಗಂಭೀರ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾರೆ!", measured: "ಅಳೆಯಲಾಗಿದೆ", normalRange: "ಸಾಮಾನ್ಯ ಶ್ರೇಣಿ", abnormal: "ಅಸಹಜ", heart_rate: "ಹೃದಯ ಬಡಿತ", blood_pressure_sys: "ಬಿಪಿ ಸಿಸ್ಟೋಲಿಕ್", blood_pressure_dia: "ಬಿಪಿ ಡಯಾಸ್ಟೋಲಿಕ್", oxygen: "ಆಮ್ಲಜನಕ", liveSensor: "🔌 ಲೈವ್ ಸೆನ್ಸಾರ್" }
        };

        const t = (key) => {
            const lang = document.getElementById('lang-select').value;
            return i18n[lang][key] || i18n['en'][key] || key;
        };

        function changeLanguage() {
            const lang = document.getElementById('lang-select').value;
            document.querySelectorAll('[data-i18n]').forEach(element => {

                if (i18n[lang] && i18n[lang][key]) { element.textContent = i18n[lang][key]; }
            });
            if (patients.length > 0) { renderSidebar(); showPatientDOM(selectedIndex); fetchPatients(); }
        }

        let patients = [];
        let selectedIndex = 0;
        let previousCriticalPatients = new Set();
        let currentAiText = "";
        
        // ⚡ DYNAMIC POLLING VARIABLES ⚡
        let pollTimer;
        let currentInterval = 20000; // Start at 20 seconds

        setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000);

        function openModal() { document.getElementById('addPatientModal').classList.add('active'); }
        function closeModal() { document.getElementById('addPatientModal').classList.remove('active'); }
        function showToast(msg, isDanger = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); 
            toast.className = `toast ${isDanger ? 'danger' : ''}`; 
            toast.textContent = msg;
            container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function speakRecommendation() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(currentAiText);
                const lang = document.getElementById('lang-select').value;
                utterance.lang = lang === 'hi' ? 'hi-IN' : lang === 'kn' ? 'kn-IN' : 'en-US';
                window.speechSynthesis.speak(utterance);
            } else { showToast("Text-to-speech not supported in this browser.", true); }
        }

        async function submitPatient(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('p_name').value, age: parseInt(document.getElementById('p_age').value),
                heart_rate: parseInt(document.getElementById('p_hr').value), blood_pressure_sys: parseInt(document.getElementById('p_sys').value),
                blood_pressure_dia: parseInt(document.getElementById('p_dia').value), oxygen: parseInt(document.getElementById('p_ox').value),
            };
            try {
                const res = await fetch('/api/patients', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(res.ok) { closeModal(); document.getElementById('addPatientForm').reset(); showToast("Patient registered successfully!"); fetchPatients(); }
            } catch (err) { console.error(err); }
        }

        async function fetchPatients() {
            try {
                // Clear the timer so they don't overlap
                clearTimeout(pollTimer);
                
                const lang = document.getElementById('lang-select').value;
                const response = await fetch(`/api/patients?lang=${lang}`);
                patients = await response.json();
                
                // --- ⚡ DYNAMIC POLLING LOGIC ⚡ ---
                // If any patient has a live sensor, go into 3-second overdrive!
                const isSensorActive = patients.some(p => p.is_sensor);
                currentInterval = isSensorActive ? 3000 : 20000;
                
                // Update the UI Badge
                const syncBadge = document.getElementById('syncIndicator');
                if (isSensorActive) {
                    syncBadge.textContent = "🔌 Live Hardware Sync: 3s";
                    syncBadge.classList.add('live-mode');
                } else {
                    syncBadge.textContent = "↻ Auto-Sync: 20s";
                    syncBadge.classList.remove('live-mode');
                }
                // ------------------------------------

                let currentCriticalPatients = new Set();
                let newEmergency = false;

                patients.forEach(p => {
                    if (p.status === 'critical') {
                        currentCriticalPatients.add(p.patient_id);
                        if (!previousCriticalPatients.has(p.patient_id)) { newEmergency = true; }
                    }
                });

                if (newEmergency) {
                    document.getElementById('alert-sound').play().catch(e => console.log("Audio blocked."));
                    showToast(t('alertUrgent'), true);
                }
                previousCriticalPatients = currentCriticalPatients;

                document.getElementById('stat-total').textContent = patients.length;
                document.getElementById('stat-normal').textContent = patients.filter(p => p.status === 'normal').length;
                document.getElementById('stat-warning').textContent = patients.filter(p => p.status === 'warning').length;
                document.getElementById('stat-critical').textContent = patients.filter(p => p.status === 'critical').length;

                renderSidebar();
                showPatientDOM(selectedIndex); 
            } catch (error) { 
                console.error("Error fetching data:", error); 
            }
            
            // Queue the next fetch
            pollTimer = setTimeout(fetchPatients, currentInterval);
        }

        function renderSidebar() {
            const list = document.getElementById('patient-list');
            list.innerHTML = '';
            patients.forEach((p, i) => {
                const statusTranslated = t(p.status) || p.status.toUpperCase();
                const sensorBadge = p.is_sensor ? `<span class="sensor-live-badge" style="padding: 1px 4px; font-size: 8px;">${t('liveSensor')}</span>` : '';
                
                const card = document.createElement('div');
                card.className = `patient-card ${p.status} ${i === selectedIndex ? 'selected' : ''}`;
                card.innerHTML = `<div class="card-top"><div><div class="patient-name">${p.name}</div><div class="patient-meta">${p.patient_id} · Age ${p.age} ${sensorBadge}</div></div><span class="badge ${p.status}">${statusTranslated.toUpperCase()}</span></div>
                    <div class="mini-vitals"><div class="mini-vital">HR <span>${p.heart_rate}</span></div><div class="mini-vital">BP <span>${p.blood_pressure_sys}/${p.blood_pressure_dia}</span></div><div class="mini-vital">O2 <span>${p.oxygen}%</span></div></div>`;
                card.onclick = () => { selectedIndex = i; showPatientDOM(i); renderSidebar(); };
                list.appendChild(card);
            });
        }

        function showPatientDOM(index) {
            const p = patients[index];
            if (!p) return;
            const o2Color = p.oxygen < 95 ? '#ef4444' : '#22c55e';
            const alertKeys = p.anomalies.map(a => a.vital);
            const isAlert = (key) => alertKeys.includes(key);
            currentAiText = p.recommendation;
            
            const mainSensorBadge = p.is_sensor ? `<span class="sensor-live-badge">${t('liveSensor')}</span>` : '';
            
            document.getElementById('main-panel').innerHTML = `
                <div class="patient-header"><div><div class="patient-title">${p.name} ${mainSensorBadge}</div><div class="patient-info">Patient ID: ${p.patient_id} · Age: ${p.age} · Last updated: ${p.timestamp}</div></div></div>
                <div class="vitals-grid">
                    ${[{ label: t('heart_rate'), val: p.heart_rate, unit: 'bpm', key: 'heart_rate', icon: '❤️' }, { label: t('blood_pressure_sys'), val: p.blood_pressure_sys, unit: 'mmHg', key: 'blood_pressure_sys', icon: '🩺' }, { label: t('blood_pressure_dia'), val: p.blood_pressure_dia, unit: 'mmHg', key: 'blood_pressure_dia', icon: '💉' }, { label: t('oxygen'), val: p.oxygen, unit: '%', key: 'oxygen', icon: '💨' }].map(v => `<div class="vital-card ${isAlert(v.key) ? 'alert' : 'normal'}"><div class="vital-icon">${v.icon}</div><div class="vital-label">${v.label}</div><div class="vital-value">${v.val}</div><div class="vital-unit">${v.unit}</div></div>`).join('')}
                </div>
                <div class="charts-grid">
                    <div class="chart-card"><div class="chart-title">${t('hrTrend')}</div><canvas id="hrChart" height="130"></canvas></div>
                    <div class="chart-card"><div class="chart-title">${t('bpTrend')}</div><canvas id="bpChart" height="130"></canvas></div>
                    <div class="chart-card"><div class="chart-title">${t('o2Sat')}</div><div class="gauge-container"><div class="gauge-value" style="color:${o2Color}">${p.oxygen}%</div><div class="gauge-label">SpO2 Level</div><div class="gauge-bar"><div class="gauge-fill" style="width:${p.oxygen}%;background:${o2Color}"></div></div></div></div>
                    <div class="chart-card"><div class="chart-title">${t('radar')}</div><canvas id="radarChart" height="130"></canvas></div>
                </div>
                <div class="two-col">
                    <div class="section"><div class="section-header"><div class="section-title">${t('alertsTitle')}</div></div><div>${p.anomalies.length === 0 ? `<div class="no-alerts">${t('noAlerts')}</div>` : p.anomalies.map(a => `<div class="alert-item"><div class="alert-icon">⚠️</div><div class="alert-content"><div class="alert-title">${t(a.vital).toUpperCase()} ${t('abnormal').toUpperCase()}</div><div class="alert-desc">${t('measured')}: ${a.value} · ${t('normalRange')}: ${a.min}–${a.max}</div></div></div>`).join('')}</div></div>
                    <div class="ai-section">
                        <div class="ai-header">
                            <div class="ai-header-left">
                                <span style="font-size:18px">🤖</span>
                                <span style="font-size:14px;font-weight:600;color:#e2e8f0">${t('predictiveAI')}</span>
                                <span class="ai-badge">Groq LLaMA 3.3 (70B)</span>
                            </div>
                            <button class="btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="speakRecommendation()">🔊 ${t('speakBtn')}</button>
                        </div>
                        <div class="ai-text">${p.recommendation}</div>
                    </div>
                </div>`;
            
            const times = p.is_sensor ? ['T-15s', 'T-12s', 'T-9s', 'T-6s', 'T-3s', 'Now'] : ['T-100s', 'T-80s', 'T-60s', 'T-40s', 'T-20s', 'Now'];
            const tickColor = '#475569'; const gridColor = 'rgba(255,255,255,0.04)';

            new Chart(document.getElementById('hrChart'), { type: 'line', data: { labels: times, datasets: [{ data: p.hr_history, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4 }] }, options: { plugins: {legend: {display: false}}, scales: { x: { ticks: {color: tickColor}, grid: {color: gridColor} }, y: { ticks: {color: tickColor}, grid: {color: gridColor} } } } });
            new Chart(document.getElementById('bpChart'), { type: 'line', data: { labels: times, datasets: [{ label: 'Sys', data: Array(6).fill(p.blood_pressure_sys), borderColor: '#3b82f6', tension: 0.4 }, { label: 'Dia', data: Array(6).fill(p.blood_pressure_dia), borderColor: '#8b5cf6', tension: 0.4 }] }, options: { plugins: {legend: {display: false}}, scales: { x: { ticks: {color: tickColor}, grid: {color: gridColor} }, y: { ticks: {color: tickColor}, grid: {color: gridColor} } } } });
            new Chart(document.getElementById('radarChart'), { type: 'radar', data: { labels: ['Heart Rate', 'BP Systolic', 'BP Diastolic', 'Oxygen'], datasets: [{ label: 'Patient', data: [(p.heart_rate/100)*100, (p.blood_pressure_sys/140)*100, (p.blood_pressure_dia/90)*100, p.oxygen], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.15)' }, { label: 'Normal Max', data: [100, 100, 100, 100], borderColor: 'rgba(34,197,94,0.3)', backgroundColor: 'rgba(34,197,94,0.05)' }] }, options: { plugins: {legend: {display: false}}, scales: { r: { ticks: {color: tickColor, backdropColor: 'transparent'}, grid: {color: 'rgba(255,255,255,0.06)'}, pointLabels: {color: '#64748b'} } } } });
        }

        changeLanguage(); 
        fetchPatients();
        
        document.body.addEventListener('click', function initAudio() {
            document.getElementById('alert-sound').load();
            document.body.removeEventListener('click', initAudio);
        }, { once: true });
    </script>
</body>
</html>
